<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>✦</title>
<link rel="manifest" href="/manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#000000">
<style>
* { margin:0; padding:0; box-sizing:border-box; scrollbar-width:none; }
*::-webkit-scrollbar { display:none; }
body {
  background:#000;
  color:#f80;
  font-family:system-ui,-apple-system,sans-serif;
  font-size:14px;
  line-height:1.5;
  height:100vh;
  display:flex;
  flex-direction:column;
  overflow:hidden;
}
.scanlines {
  pointer-events:none;
  position:fixed;
  top:0;left:0;width:100%;height:100%;
  background:repeating-linear-gradient(0deg,rgba(0,0,0,.15) 0,rgba(0,0,0,.15) 1px,transparent 1px,transparent 3px);
  z-index:999;
}
.msg { max-width:86%; animation:fade .15s ease-out; }
@keyframes fade { from{opacity:0;transform:translateY(5px)} to{opacity:1;transform:translateY(0)} }
.u-bubble {
  background:rgba(255,136,0,.12);
  border:1px solid rgba(255,136,0,.3);
  border-bottom-right-radius:2px;
}
.b-bubble {
  background:rgba(255,136,0,.04);
  border:1px solid rgba(255,136,0,.12);
  border-bottom-left-radius:2px;
}
.stream::after { content:'▋'; animation:bl .8s step-end infinite; margin-left:1px; }
@keyframes bl { 50%{opacity:0} }
.prose p { margin:.25rem 0; }
.prose code { background:rgba(255,136,0,.1); padding:1px 5px; border-radius:3px; font-size:.85em; color:#fc0; }
.prose strong { color:#fa0; }
#i::placeholder { color:rgba(255,136,0,.25); }

/* Settings Modal */
#config-panel {
  position:fixed; top:0; left:0; width:100%; height:100%;
  background:#000; z-index:1000;
  display:none; flex-direction:column; padding:20px;
}
#sys-prompt {
  flex:1; background:#111; border:1px solid #333; color:#f80;
  padding:10px; font-family:monospace; font-size:12px; resize:none;
  outline:none;
}
.btn {
  background:0; border:1px solid rgba(255,136,0,.2); color:#f80;
  border-radius:4px; padding:6px 12px; font-size:11px; cursor:pointer;
  font-family:inherit; opacity:.6; transition:.15s;
}
.btn:hover { opacity:1; }
</style>
</head>
<body>
<div class="scanlines"></div>

<div id="config-panel">
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
    <span style="font-size:11px;letter-spacing:1px;opacity:.5">SYSTEM PROMPT</span>
    <button onclick="toggleConfig()" class="btn">Cerrar</button>
  </div>
  <textarea id="sys-prompt" placeholder="Escribe aquí las instrucciones del sistema..."></textarea>
  <div style="margin-top:10px;text-align:right">
    <button onclick="saveConfig()" class="btn" style="border-color:#f80;opacity:1">Guardar</button>
  </div>
</div>

<div style="display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid rgba(255,136,0,.15);padding:10px 14px;flex-shrink:0">
  <div style="display:flex;gap:12px;align-items:center">
    <span style="color:rgba(255,136,0,.4);font-size:11px;letter-spacing:1px">◆</span>
    <button onclick="toggleConfig()" style="background:0;border:0;color:#f80;opacity:.15;cursor:pointer;font-size:14px;padding:0 5px" title="Config">⚙</button>
  </div>
  <button onclick="nuevo()" class="btn">↺</button>
</div>

<div id="chat" style="flex:1;overflow-y:auto;padding:14px;display:flex;flex-direction:column;gap:14px"></div>

<div style="border-top:1px solid rgba(255,136,0,.15);padding:10px 12px;flex-shrink:0">
  <form id="f" style="display:flex;gap:6px;align-items:center;border:1px solid rgba(255,136,0,.2);border-radius:4px;padding:8px 12px;background:rgba(255,136,0,.02)">
    <input id="i" type="text" placeholder="..." autocomplete="off" required style="flex:1;background:0;border:0;outline:0;color:#f80;font-size:16px;font-family:inherit">
    <button type="submit" class="btn" style="opacity:.7;font-weight:600">↵</button>
  </form>
</div>

<script>
let sid = localStorage.getItem('sid');
let streaming = false;
let cur = null;
const c = document.getElementById('chat');
const f = document.getElementById('f');
const i = document.getElementById('i');
const cp = document.getElementById('config-panel');
const sp = document.getElementById('sys-prompt');

// Load saved system prompt
sp.value = localStorage.getItem('sys_prompt') || '';

function toggleConfig() {
  cp.style.display = cp.style.display === 'flex' ? 'none' : 'flex';
  if (cp.style.display === 'flex') sp.focus();
}

function saveConfig() {
  localStorage.setItem('sys_prompt', sp.value);
  toggleConfig();
}

function persist() {
  const msgs = [];
  for (const el of c.children) {
    const role = el.classList.contains('justify-end') ? 'u' : 'b';
    const bubble = el.firstChild;
    msgs.push({role, html: bubble.dataset.raw || bubble.innerHTML});
  }
  localStorage.setItem('hist', JSON.stringify(msgs));
}

function add(role, html, str) {
  const w = document.createElement('div');
  w.style.display = 'flex';
  w.className = role==='u' ? 'justify-end' : 'justify-start';
  w.classList.add('msg');
  const b = document.createElement('div');
  b.className = `px-3 py-2.5 text-sm leading-relaxed prose ${role==='u' ? 'u-bubble' : 'b-bubble'}`;
  if (role==='b' && str) { b.classList.add('stream'); cur = b; }
  if (html) {
    const isRaw = role==='u';
    if (isRaw) b.innerHTML = html.replace(/</g,'&lt;');
    else { b.innerHTML = fmt(html); b.dataset.raw = html; }
  } else {
    b.dataset.raw = '';
  }
  w.appendChild(b);
  c.appendChild(w);
  c.scrollTop = c.scrollHeight;
  return b;
}

function fmt(t) {
  let h = t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  h = h.replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>');
  h = h.replace(/`([^`]+)`/g,'<code>$1</code>');
  h = h.replace(/\n{2,}/g,'</p><p>');
  h = '<p>'+h+'</p>';
  return h;
}

function append(t) {
  if (!cur) { cur = add('b','',true); cur.dataset.raw = ''; }
  cur.classList.remove('stream');
  const raw = (cur.dataset.raw||'') + t;
  cur.innerHTML = fmt(raw);
  cur.dataset.raw = raw;
  cur.classList.add('stream');
  c.scrollTop = c.scrollHeight;
}

function fin() {
  if (cur) {
    cur.classList.remove('stream');
    if (cur.dataset.raw) {
      persist();
    }
    cur = null;
  }
  streaming = false;
  i.disabled = false;
  f.querySelector('button').disabled = false;
}

async function send(t, isRetry = false) {
  if (streaming && !isRetry) return;
  streaming = true;
  i.disabled = true;
  f.querySelector('button').disabled = true;
  
  if (!isRetry) {
    add('u', t);
    persist();
    i.value = '';
  }
  
  const system_prompt = localStorage.getItem('sys_prompt');

  try {
    const r = await fetch('/chat', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        message:t, 
        session_id:sid,
        system_prompt: system_prompt || undefined
      })
    });
    if (!r.ok) throw new Error('Network error');
    const reader = r.body.getReader();
    const dec = new TextDecoder();
    let buf = '';
    while (true) {
      const {done,value} = await reader.read();
      if (done) break;
      buf += dec.decode(value, {stream:true});
      let lines = buf.split('\n\n');
      buf = lines.pop()||'';
      for (const blk of lines) {
        if (!blk.startsWith('data: ')) continue;
        const j = blk.slice(6).trim();
        if (!j) continue;
        try {
          const d = JSON.parse(j);
          if (d.type==='session' && d.session_id) {
            sid = d.session_id;
            localStorage.setItem('sid', sid);
          } else if (d.type==='text' && d.text) {
            append(d.text);
          } else if (d.type==='error') {
            if (d.message === 'SESSION_EXPIRED') {
               sid = null;
               localStorage.removeItem('sid');
               fin();
               return send(t, true); // Automatic retry as new session
            }
            add('b','⚠ '+(d.message||'error'));
            persist();
            fin(); return;
          } else if (d.type==='done') {
            persist();
            fin(); return;
          }
        } catch(e) {}
      }
    }
  } catch(err) {
    add('b','⚠ '+err.message);
    persist();
    fin();
  }
}

function nuevo() {
  if (streaming) return;
  c.innerHTML = '';
  localStorage.removeItem('hist');
  sid = null;
  localStorage.removeItem('sid');
  i.focus();
}

function restore() {
  const saved = localStorage.getItem('hist');
  if (saved) {
    try {
      const msgs = JSON.parse(saved);
      for (const m of msgs) {
        add(m.role, m.html, false);
      }
    } catch(e) {}
  }
}

f.addEventListener('submit', e => {
  e.preventDefault();
  const v = i.value.trim();
  if (v) send(v);
});

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/sw.js');
}

restore();
setTimeout(() => i.focus(), 300);
</script>
</body>
</html>
setTimeout(() => i.focus(), 300);
</script>
</body>
</html>
